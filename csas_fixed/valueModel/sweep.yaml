program: train_wandb.py
method: grid
metric:
  name: val/loss
  goal: minimize
parameters:
  lr:
    values: [1e-4, 3e-4, 1e-3]
  hidden_dim:
    values: [128, 256, 512]
  n_layers:
    values: [3, 4, 6]
  dropout:
    values: [0.05, 0.1]
command:
  - ${env}
  - python
  - ${program}
  - --stones_csv
  - ../2026/Stones.csv
  - --ends_csv
  - ../2026/Ends.csv
  - --epochs
  - "200"
  - --val_split
  - "0.1"
  - --wandb_project
  - curling-value
