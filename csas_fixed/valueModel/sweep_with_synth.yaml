program: train_with_synth_wandb.py
method: bayes
metric:
  name: val/loss
  goal: minimize
parameters:
  synth_frac:
    values: [0.0, 0.10, 0.25, 0.50, 1.0]
  lr:
    values: [1e-4, 3e-4, 1e-3]
  hidden_dim:
    values: [128, 256, 512]
  n_layers:
    values: [3, 4, 6]
  dropout:
    values: [0.05, 0.1]
  synth_max:
    values: [200000]   # protects you from massive synth, still tests “more synth” vs “less synth”
command:
  - ${env}
  - python
  - ${program}
  - --stones_csv
  - ../2026/Stones.csv
  - --ends_csv
  - ../2026/Ends.csv
  - --synth_stones_csv
  - synth_stones.csv
  - --synth_ends_csv
  - synth_ends.csv
  - --epochs
  - "200"
  - --val_split
  - "0.1"
  - --wandb_project
  - curling-value
  - --wandb_job_type
  - train_with_synth
